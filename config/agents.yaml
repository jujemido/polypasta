    strategy:
      rsi_period: 14
      rsi_safe_min: 40
      rsi_safe_max: 60
      min_trend_strength: 0.2
      vix_max: 25
      volume_max_ratio: 0.8
      news_cooldown_hours: 48

    risk:
      stop_loss_pct: 0.02
      take_profit_pct: 0.05
      max_drawdown: 0.12
      kelly_fraction: 0.25
      base_pessimism: 0.15

