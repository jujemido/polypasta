    timeframe: "15m"
    bars_to_fetch: 200
    max_positions: 3
    frequency: "3-10 trades/día"
    horizon: "Minutos - 1 día"
    risk_stars: 5
    target_win_rate: 0.50
    symbols:
      # 🇺🇸 Índices USA
      - "US100"
      - "US500"
      - "US30"
      - "US2000"
