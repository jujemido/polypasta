  # Busca movimientos de alta probabilidad. SMA crossover + confirmación.
  # ═══════════════════════════════════════════════════════════════════════
  conservative:
    enabled: true
    name: "Conservador"
    capital_pct: 0.25
    emoji: "🤵"
    description: "Alta probabilidad en mercados europeos"
    timeframe: "1h"
    bars_to_fetch: 200
    max_positions: 2
    frequency: "1-3 trades/día"
    horizon: "Intradía (1-8h)"
    risk_stars: 2
    target_win_rate: 0.70
    symbols:
      # 🇪🇸 España
      - "IBEX35"
      # 🇩🇪 Alemania
      - "DAX40"
      # 🇪🇺 Europa
      - "EUROSTOXX50"
      - "UK100"
      - "CAC40"
      - "FTSE100"
      - "SMI20"
      - "AEX"
      - "OMXS30"
      - "BEL20"
      # 🇺🇸 Grandes índices USA (baja volatilidad)
      - "US500"
      # ETFs europeos
      - "EZU"
      - "VGK"
      - "EWG"
      - "EWU"
      - "EWQ"
      # Acciones europeas blue-chip
      - "SAP"
      - "SIE"
      - "ALV"
      - "MUV2"
      - "BAYN"
      - "BMW"
      - "VOW3"
      - "DTE"
      - "DPW"
      - "HEI"
      - "LIN"
      - "AIR"
      - "OR"
      - "MC"
      - "SAN"
      - "BNP"
      - "ACA"
      - "SU"
      - "EL"
      - "TTE"
      - "IBE"
      - "TEF"
      - "BBVA"
      - "SAN"
      - "ITX"
      - "FER"
      - "ENG"
      - "REP"
      # Bonos
      - "US10Y"
      - "TLT"
      - "IEI"
      - "SHY"

    strategy:
      sma_fast: 20
      sma_slow: 50
      confirmation_candles: 2
      volume_min_ratio: 1.3
      rsi_period: 14
      rsi_min: 40
      rsi_max: 70

    risk:
      stop_loss_pct: 0.025
      take_profit_pct: 0.05
      max_drawdown: 0.15
      kelly_fraction: 0.30

  # ═══════════════════════════════════════════════════════════════════════
