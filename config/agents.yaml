  # Stress testing + margen de seguridad. Solo cuando todo está a favor.
  # ═══════════════════════════════════════════════════════════════════════
  pessimistic:
    enabled: true
    name: "Pesimista"
    capital_pct: 0.20
    emoji: "🧐"
    description: "Busca refugio en incertidumbre"
    timeframe: "1h"
    bars_to_fetch: 300
    max_positions: 1
    frequency: "0-2 trades/día"
    horizon: "1-5 días"
    risk_stars: 3
    target_win_rate: 0.65
    symbols:
