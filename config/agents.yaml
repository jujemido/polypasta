# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

# ═══════════════════════════════════════════════════════════════════════
# 💰 TESORERO — Protege beneficios (20% de cada ganancia)
# ═══════════════════════════════════════════════════════════════════════
  treasury:
    enabled: true
    name: "Tesorero"
    capital_pct: 0.0  # No tiene capital asignado, acumula de beneficios
    emoji: "💰"
    description: "Protege el 20% de cada beneficio en una hucha"
    treasury_pct: 0.20  # 20% de cada ganancia

committee:
  enabled: true
  total_capital: 100
  execution_interval_min: 15
  dashboard_data_file: "data/dashboard_data.json"