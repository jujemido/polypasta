# =============================================================================
# AGENTS CONFIGURATION
# =============================================================================
# Cada agente tiene su propio % del capital, mercados, y personalidad.
# Cambia aquí pesos y parámetros sin tocar código.
# =============================================================================

agents:
  # ═══════════════════════════════════════════════════════════════════════
